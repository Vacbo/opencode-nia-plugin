name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pack without publishing)"
        type: boolean
        default: false

# Least-privilege: only grant id-token for OIDC exchange with npm registry.
# `contents: read` is needed to checkout; all other permissions stay default-deny.
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22+ required for npm OIDC Trusted Publishing.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json version match: $PKG_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Clean build
        run: |
          rm -rf dist
          bun run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || { echo "::error::dist/index.js missing"; exit 1; }
          test -f dist/index.d.ts || { echo "::error::dist/index.d.ts missing"; exit 1; }
          test -f dist/cli.js || { echo "::error::dist/cli.js missing"; exit 1; }
          echo "Build artifacts OK"

      - name: Ensure no stale legacy files in dist
        run: |
          # Phase 4 deleted src/api/client.ts; dist must not contain it either.
          if find dist -name "client.js" -o -name "client.d.ts" | grep -q .; then
            echo "::error::Stale dist/api/client.* files detected. Clean rebuild failed."
            find dist -name "client.js" -o -name "client.d.ts"
            exit 1
          fi

      - name: Pack (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        # --provenance uploads a signed attestation linking the package to this
        # workflow run. Required for Trusted Publishing (no NODE_AUTH_TOKEN).
        run: npm publish --access public --provenance
